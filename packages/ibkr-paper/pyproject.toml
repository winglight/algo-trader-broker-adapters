[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "algo-trader-broker-adapter-ibkr-paper"
version = "0.1.0"
description = "IBKR Paper adapter for the algo-trader Broker SDK"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
dependencies = [
  "algo-trader-broker-sdk>=1,<2",
  "ib_async>=2.0.1,<3",
]

[project.entry-points."algo_trader.broker_adapters"]
ibkr_paper = "algo_trader_broker_adapter_ibkr_paper:create_adapter"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
algo_trader_broker_adapter_ibkr_paper = ["py.typed"]
